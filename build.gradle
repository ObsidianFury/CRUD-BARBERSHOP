 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    // Implementaion for libraries
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    implementation 'com.mysql:mysql-connector-j:8.3.0'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.example.BarberShop.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.login.Login' // Εδώ ορίζουμε ότι η εφαρμογή ξεκινάει από το Login
        )
    }
    
    // Πακετάρει μαζί όλα τα απαραίτητα libraries (π.χ. mysql connector, jcalendar)
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    
    // Αποτρέπει σφάλματα με διπλότυπα αρχεία κατά το πακετάρισμα
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}